name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  # 1. Этап проверки кода (Linting)
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install linter
        run: pip install flake8
      - name: Run flake8
        # Проверяем только синтаксические ошибки (E9, F63, F7, F82)
        run: flake8 ./backend --count --select=E9,F63,F7,F82 --show-source --statistics

  # 2. Этап сборки и пуша (зависит от lint)
  build-and-push:
    runs-on: ubuntu-latest
    needs: lint  # Сборка не начнется, пока lint не пройдет успешно!
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build and push Backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/tutorialbox-backend:latest,${{ secrets.DOCKER_USERNAME }}/tutorialbox-backend:${{ github.sha }}
      
      - name: Build and push Frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/tutorialbox-frontend:latest,${{ secrets.DOCKER_USERNAME }}/tutorialbox-frontend:${{ github.sha }}
