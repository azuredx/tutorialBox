name: CI/CD TutorialBox

on:
  push:
    # Запускаем пайплайн при пуше в любые ветки, чтобы работали тесты
    branches: [ "main", "feature/*" ]
  workflow_dispatch:

jobs:
  # 1. Сначала проверяем качество кода
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install flake8
        run: pip install flake8
      - name: Run lint
        # Проверяем бэкенд на критические ошибки
        run: flake8 ./backend --count --select=E9,F63,F7,F82 --show-source --statistics

  # 2. Сборка и пуш (только если прошел lint И это ветка main)
  build-and-push:
    runs-on: ubuntu-latest
    needs: lint
    if: github.ref == 'refs/heads/main' # Условие: пушим только из main
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build and push Backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/tutorialbox-backend:latest
            ${{ secrets.DOCKER_USERNAME }}/tutorialbox-backend:${{ github.sha }}

      - name: Build and push Frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/tutorialbox-frontend:latest
            ${{ secrets.DOCKER_USERNAME }}/tutorialbox-frontend:${{ github.sha }}
