name: Build and Push Docker Image

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Extract metadata
        id: meta
        run: |
          echo "tags=${{ secrets.DOCKER_USERNAME }}/tutorialbox:latest,${{ secrets.DOCKER_USERNAME }}/tutorialbox:${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
      
      - name: Build and push Backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/tutorialbox-backend:latest,${{ secrets.DOCKER_USERNAME }}/tutorialbox-backend:${{ github.sha }}
      
      - name: Build and push Frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/tutorialbox-frontend:latest,${{ secrets.DOCKER_USERNAME }}/tutorialbox-frontend:${{ github.sha }}
